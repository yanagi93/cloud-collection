version: "2"
sql:
  - engine: postgresql
    schema: sql/schema
    queries: sql/queries
    gen:
      go:
        package: dbgen
        out: internal/db/gen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: pg_catalog.timestamptz
            go_type:
              import: time
              type: Time
